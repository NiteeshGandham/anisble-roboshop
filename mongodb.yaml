- name: Configuring the mongodb sever
  hosts: mongodb
  become: yes
  tasks:
  - name: Setup(copying) the MongoDB repo file
    ansible.builtin.copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: install the MongoDB
    ansible.builtin.apt:
      name: mongodb-org
      state: present

  - name: allow remote connections
    ansible.builtin.file:
    path: /etc/mongod.conf
    regexp: '127.0.0.1'
    replace: '0.0.0.0'

  - name: Start and enable the mongodb service
    ansible.builtin.service:
      name: mongod
      enabled: yes
      state: started



