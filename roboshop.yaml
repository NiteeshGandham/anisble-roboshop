- name: create EC2 instances and r53 record
  hosts: all
  connection: local
  vars:
    domain_name: ngandham.online
    sg_id: sg-0796c7394eedaf2b5
    ami_id: ami-0220d79f3f480ecf5
    instances:
    - catalouge
    - mongodb
    env: Dev
    action: create
  tasks:
  - name: create a ec2 instance
    amazon.aws.ec2_instance:
      instance_type: t3.micro
      image_id: "{{ ami_id }}"
      security_group: "{{ sg_id }}"
      name: "{{ item }}-{{ env }}"
      tags: 
        Name: "{{ item }}"
        Component: "{{ item }}"
        Env: "{{ env }}"
        Project: Roboshop
    loop: "{{ instances }}"
    register: ec2_output
    when: action == "create"

  - name: Print the output format
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"
    when: action == "create" 


  - name: create route53 records
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}-{{ env }}.{{ domain_name }}" #cataloge-dev.ngandham.online
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"
    when: action == "create" 

  - name: create route53 records for roboshop
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "roboshop-{{ env }}.{{ domain_name }}" #cataloge-dev.ngandham.online
      type: A
      ttl: 1
      value: "{{ item.instances[0].public_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"
    when: 
    - item.item == "frontend"
    - action == "create" 



  - name: ec2 instance delete
    amazon.aws.ec2_instance:
      name: "{{ item }}-{{ env }}"
    loop: "{{ instances }}"
    when: action == "destroy"    


  - name: delete route53 records for roboshop
    amazon.aws.route53:
      state: absent
      zone: "{{ domain_name }}"
      record: "{{ item }}-{{ env }}.{{ domain_name }}"
      type: A
      ttl: 1
    loop: "{{ instances }}"
    when: action == "destroy"


