- name: configuring cart service
  hosts: cart
  connection: local
  become: yes
  tasks:
  - name: enable the nodejs:20
    ansible.builtin.command: dnf module enable nodejs:20 -y


  - name: install node js
    ansible.builtin.dnf:
      name: nodejs
      state: present
  

  - name: creating app directory if it not presents
    ansible.builtin.file:
      path: /app
      state: directory

  - name: create application system user
    ansible.builtin.user:
      system: yes
      name: roboshop
      shell: /sbin/nologin
      comment: "roboshop system user"
      home: /app

  - name: Download the application code
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/cart-v3.zip
      dest: /tmp/cart.zip


  - name: un archive the application zip file
    ansible.builtin.unarchive:
      src: /tmp/cart.zip
      dest: /app
      remote_src: yes


  - name: download the dependencies
    community.general.npm:
      path: /app

  
  - name: copy the cart.service file to /etc/systemd/system/cart.service
    ansible.builtin.copy:
      src: cart.service
      dest: /etc/systemd/system/cart.service


  - name: Reload systemd
    ansible.builtin.systemd_service:
      daemon_reload: true


  - name: start and enable the cart service
    ansible.builtin.service:
      name: cart
      enabled: yes
      state: restarted