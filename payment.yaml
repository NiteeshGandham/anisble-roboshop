- name: configuring payment server
  hosts: payment
  become: yes
  tasks:
  - name: install python3 gcc python3-devel
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
    loop:
    - python3
    - gcc
    - python3-devel

  - name: add the application user
    ansible.builtin.user:
      name: roboshop
      shell: /sbin/nologin
      home: /app
      system: yes
      comment: "roboshop system user"

  - name: create a app directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: Download the application code to created app directory.
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
      dest: /tmp/payment.zip

  - name: unarchive the application code
    ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app


  - name: install dependencies
    ansible.builtin.pip:
      requirements: requirements.txt
      executable: pip3.9

  - name: Setup SystemD Payment Service
    ansible.builtin.template:
      src: payment.service
      dest: /etc/systemd/system/payment.service

  - name: reload the system service.
    ansible.builtin.systemd_service:
      daemon_reload: yes


  - name: start and enable the service
    ansible.builtin.service:
      name: payment
      state: restarted
      enabled: yes

      

      

  